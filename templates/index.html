<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tableau de bord Achats</title>
    <link rel="stylesheet" href="/static/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  </head>
  <body>
    <header class="header">
      <h1>Tableau de bord Achats</h1>
      <p>Airbus Atlantic — Simulation</p>
    </header>

    <main class="container">
      <section class="kpi-grid">
        <div class="kpi-card">
          <h3>Total achats validés</h3>
          <p id="kpi-total" class="kpi-value">-</p>
        </div>
        <div class="kpi-card">
          <h3>Nombre de commandes</h3>
          <p id="kpi-commandes" class="kpi-value">-</p>
        </div>
        <div class="kpi-card">
          <h3>Nombre de fournisseurs</h3>
          <p id="kpi-fournisseurs" class="kpi-value">-</p>
        </div>
        <div class="kpi-card">
          <h3>Taux de validation</h3>
          <p id="kpi-taux" class="kpi-value">-</p>
        </div>
      </section>

      <section class="charts-grid">
        <article class="chart-card">
          <h2>Évolution mensuelle des achats</h2>
          <canvas id="chartMois"></canvas>
        </article>

        <article class="chart-card">
          <h2>Répartition par catégorie</h2>
          <canvas id="chartCategorie"></canvas>
        </article>

        <article class="chart-card">
          <h2>Top 5 fournisseurs</h2>
          <canvas id="chartFournisseur"></canvas>
        </article>

        <article class="chart-card">
          <h2>Cascade budgétaire</h2>
          <canvas id="chartCascade"></canvas>
        </article>
      </section>
    </main>

    <script>
      const euroFmt = new Intl.NumberFormat("fr-FR", {
        style: "currency",
        currency: "EUR",
        maximumFractionDigits: 0,
      });

      const numFmt = new Intl.NumberFormat("fr-FR");

      function baseChartOptions() {
        return {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { labels: { color: "#1f2937" } } },
        };
      }

      async function fetchJson(url) {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`Erreur API: ${url}`);
        return res.json();
      }

      async function loadKpis() {
        const kpis = await fetchJson("/api/kpis");
        document.getElementById("kpi-total").textContent = euroFmt.format(kpis.total_achats);
        document.getElementById("kpi-commandes").textContent = numFmt.format(kpis.nb_commandes);
        document.getElementById("kpi-fournisseurs").textContent = numFmt.format(kpis.nb_fournisseurs);
        document.getElementById("kpi-taux").textContent = `${kpis.taux_validation} %`;
      }

      async function drawMois() {
        const data = await fetchJson("/api/par_mois");
        new Chart(document.getElementById("chartMois"), {
          type: "line",
          data: {
            labels: data.map((d) => d.mois),
            datasets: [
              {
                label: "Achats validés (€)",
                data: data.map((d) => d.total),
                borderColor: "#295e94",
                backgroundColor: "rgba(41, 94, 148, 0.2)",
                tension: 0.25,
                fill: true,
              },
            ],
          },
          options: {
            ...baseChartOptions(),
            scales: {
              y: {
                ticks: {
                  callback: (v) => `${Math.round(v / 1000)}k€`,
                },
              },
            },
          },
        });
      }

      async function drawCategorie() {
        const data = await fetchJson("/api/par_categorie");
        new Chart(document.getElementById("chartCategorie"), {
          type: "doughnut",
          data: {
            labels: data.map((d) => d.categorie),
            datasets: [
              {
                data: data.map((d) => d.total),
                backgroundColor: [
                  "#295e94",
                  "#3f7dbf",
                  "#5b94cf",
                  "#7aaad9",
                  "#a0c2e7",
                ],
                borderColor: "#ffffff",
                borderWidth: 2,
              },
            ],
          },
          options: baseChartOptions(),
        });
      }

      async function drawFournisseur() {
        const data = await fetchJson("/api/par_fournisseur");
        new Chart(document.getElementById("chartFournisseur"), {
          type: "bar",
          data: {
            labels: data.map((d) => d.fournisseur),
            datasets: [
              {
                label: "Montant validé (€)",
                data: data.map((d) => d.total),
                backgroundColor: "#295e94",
                borderRadius: 6,
              },
            ],
          },
          options: {
            ...baseChartOptions(),
            indexAxis: "y",
            scales: {
              x: {
                ticks: {
                  callback: (v) => `${Math.round(v / 1000)}k€`,
                },
              },
            },
          },
        });
      }

      async function drawCascade() {
        const data = await fetchJson("/api/cascade_budget");

        let running = 0;
        const base = [];
        const variation = [];
        const colors = [];

        data.forEach((item) => {
          if (item.type === "total") {
            base.push(0);
            variation.push(item.value);
            colors.push("#295e94");
            running = item.value;
          } else {
            const next = running + item.value;
            base.push(Math.min(running, next));
            variation.push(Math.abs(item.value));
            colors.push(item.value < 0 ? "#e76f51" : "#2a9d8f");
            running = next;
          }
        });

        new Chart(document.getElementById("chartCascade"), {
          type: "bar",
          data: {
            labels: data.map((d) => d.label),
            datasets: [
              {
                label: "Base",
                data: base,
                backgroundColor: "rgba(0,0,0,0)",
                stack: "waterfall",
              },
              {
                label: "Variation",
                data: variation,
                backgroundColor: colors,
                stack: "waterfall",
                borderRadius: 4,
              },
            ],
          },
          options: {
            ...baseChartOptions(),
            scales: {
              x: { stacked: true },
              y: {
                stacked: true,
                ticks: {
                  callback: (v) => `${Math.round(v / 1000)}k€`,
                },
              },
            },
          },
        });
      }

      async function initDashboard() {
        try {
          await loadKpis();
          await Promise.all([drawMois(), drawCategorie(), drawFournisseur(), drawCascade()]);
        } catch (err) {
          console.error(err);
          alert("Impossible de charger le dashboard. Vérifiez que Flask tourne bien.");
        }
      }

      initDashboard();
    </script>
  </body>
</html>
